name: Bump Formula

# Triggered by a repository_dispatch event sent from the main wireshark-mcp
# release workflow, or can be run manually with a version input.
on:
  repository_dispatch:
    types: [new-release]
  workflow_dispatch:
    inputs:
      version:
        description: "PyPI version to bump to (e.g. 1.2.0)"
        required: true

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "version=${{ github.event.client_payload.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate new Formula
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          pip install requests
          python3 .github/scripts/generate_formula.py "$VERSION" \
            > Formula/wireshark-mcp.rb

      - name: Open PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "bump/wireshark-mcp-${{ steps.ver.outputs.version }}"
          commit-message: "chore: bump wireshark-mcp to ${{ steps.ver.outputs.version }}"
          title: "chore: bump wireshark-mcp to ${{ steps.ver.outputs.version }}"
          body: |
            Auto-generated by the bump-formula workflow.

            - PyPI version: `${{ steps.ver.outputs.version }}`
            - Formula: `Formula/wireshark-mcp.rb`
